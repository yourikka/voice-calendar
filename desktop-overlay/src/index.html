<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Calendar Bubble</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="overlay-shell">
      <section class="overlay-stack">
        <section id="compact-bar" class="compact-dock" aria-label="语音智能体">
        <span id="state-text" hidden>待命</span>
        <span id="reply-text" hidden>等待语音输入</span>
        <button id="record-audio" class="voice-key" type="button" aria-label="开始语音输入">
          <span id="voice-orb-label">语音</span>
        </button>
        <span id="compact-drag-handle" class="compact-drag-handle pywebview-drag-region" aria-hidden="true"></span>
        <button id="expand-panel" class="expand-key" type="button" aria-label="展开工具">
          <span aria-hidden="true">⌄</span>
        </button>
        </section>

        <section id="assistant-panel" class="assistant-panel" hidden>
        <header class="panel-header pywebview-drag-region">
          <div id="panel-drag-handle" class="panel-title drag-handle">
            <strong>Voice Agent</strong>
            <span id="status-text">待命</span>
          </div>
          <div class="header-actions">
            <button id="open-calendar" class="icon-button text-button" type="button">日历</button>
            <button id="close-panel" class="icon-button" type="button" aria-label="收起">
              <span aria-hidden="true">×</span>
            </button>
          </div>
        </header>

        <section class="tool-panel" aria-labelledby="tool-title">
          <button id="tool-panel-toggle" class="section-toggle" type="button" aria-expanded="false" aria-controls="tool-panel-body">
            <span class="section-heading">
              <span id="tool-title">MCP 工具</span>
              <span id="backend-text">连接中</span>
            </span>
            <span id="tool-panel-arrow" class="section-arrow" aria-hidden="true">⌄</span>
          </button>
          <div id="tool-panel-body" class="tool-panel-body" hidden>
            <div id="tool-checklist" class="tool-checklist"></div>
          </div>
        </section>

        <section class="result-panel" aria-label="执行结果">
          <p id="reply-message" class="reply-message">等待语音输入</p>
          <p id="transcript-text">等待语音输入</p>
          <p id="voice-provider">Agent fallback 已启用</p>
        </section>

        <div id="candidate-panel" class="candidate-panel" hidden>
          <div class="section-heading">
            <span>候选</span>
            <span id="candidate-count">0</span>
          </div>
          <div id="candidate-list" class="candidate-list"></div>
        </div>

        <div id="confirmation-panel" class="confirmation-panel" hidden>
          <button id="confirm-button" class="primary-button" type="button">确认</button>
          <button id="cancel-button" class="ghost-button" type="button">取消</button>
        </div>
        </section>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
