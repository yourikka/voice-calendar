<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Calendar Overlay Preview</title>
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, rgb(255 81 92 / 18%), transparent 36%),
          radial-gradient(circle at bottom left, rgb(35 117 255 / 16%), transparent 30%),
          #f4f6fb;
      }
    </style>
  </head>
  <body>
    <main id="preview-root"></main>
    <script>
      fetch("./src/index.html")
        .then((response) => response.text())
        .then((html) => {
          const body = html.match(/<body>([\s\S]*)<\/body>/i)?.[1] || "";
          document.querySelector("#preview-root").outerHTML = body;
          const stylesheet = document.createElement("link");
          stylesheet.rel = "stylesheet";
          stylesheet.href = "./src/styles.css";
          document.head.appendChild(stylesheet);

          const fake = {
            getConfig: async () => ({
              backendBaseUrl: "http://127.0.0.1:8000",
              toolOptions: [
                {
                  value: "voice.handle_command",
                  label: "语音日历",
                  description: "录音后直接识别并执行日历命令，适合多轮语音补全。",
                },
                {
                  value: "calendar.handle_command",
                  label: "文本日历命令",
                  description: "文本和转写结果都直接进入日历命令解析。",
                },
                {
                  value: "news.get_today_hot_topics",
                  label: "今日热点",
                  description: "获取当天热点资讯，语音输入会先转写再触发热点工具。",
                },
              ],
            }),
            openCalendar: async () => {
              document.title = "Voice Calendar Overlay Preview - calendar opened";
              return { ok: true, target: "preview-window" };
            },
            setMode: async () => ({ ok: true }),
            startDrag: async () => ({ ok: true }),
            moveDrag: async () => ({ ok: true }),
            endDrag: async () => ({ ok: true }),
            audioToBase64: async () => "",
            callMcpTool: async (toolName, payload) => {
              if (toolName === "voice.transcribe_audio") {
                return {
                  transcript: "今天有什么热点",
                  asr_provider: "preview-asr",
                };
              }
              if (toolName === "voice.handle_command") {
                return {
                  session_id: "preview-session",
                  state: "completed",
                  intent: "get_today_news",
                  reply_text: "已根据语音获取今日热点。",
                  transcript: "今天有什么热点",
                  asr_provider: "preview-asr",
                  requires_user_input: false,
                };
              }
              if (toolName === "calendar.undo_last_operation") {
                return { state: "undone", reply_text: "已撤销刚才的操作。" };
              }
              if (toolName === "news.get_today_hot_topics") {
                return {
                  state: "completed",
                  reply_text: "已获取今日热点。",
                  transcript: payload?.text || "热点查询",
                  intent: "get_today_hot_topics",
                  topics: [
                    { title: "AI 办公工具热度上升", summary: "多模态与桌面代理成为近期焦点。" },
                    { title: "端侧语音助手体验再被关注", summary: "低延迟与可控工具调用成为产品重点。" },
                  ],
                };
              }
              return {
                session_id: "preview-session",
                state: "collecting_slots",
                intent: "create_event",
                reply_text: "这个事件几点开始？",
                transcript: payload?.text || "有个会议",
                requires_user_input: true,
                slots: { title: "会议" },
                missing_fields: ["start_time"],
                candidates: [],
              };
            },
          };
          window.overlayAPI = fake;
          const script = document.createElement("script");
          script.src = "./src/renderer.js";
          document.body.appendChild(script);
        });
    </script>
  </body>
</html>
