<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Calendar</title>
    <link rel="stylesheet" href="/static/app.css" />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.20/locales-all.global.min.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#calendar-title">跳到日历</a>

    <div class="app-shell">
      <header class="topbar" aria-label="工作台顶部">
        <div class="month-heading">
          <button id="month-picker-toggle" class="month-title-button" type="button" aria-haspopup="dialog">
            <span id="heading-year">2026</span><i>/</i><strong id="heading-month">05</strong>
          </button>
          <p>默认视图</p>
          <form id="month-picker" class="month-picker" hidden>
            <label>
              年
              <input id="year-input" type="number" min="1970" max="2100" value="2026" />
            </label>
            <label>
              月
              <input id="month-input" type="number" min="1" max="12" value="5" />
            </label>
            <button type="submit">切换</button>
          </form>
        </div>

        <form class="command-bar" id="command-form">
          <label class="sr-only" for="command-input">输入日历指令</label>
          <input
            id="command-input"
            name="command"
            type="text"
            autocomplete="off"
            placeholder="输入：明早八点提醒我带身份证，或搜索 周会"
          />
          <button type="submit" aria-label="发送指令">发送</button>
        </form>

        <div class="toolbar" aria-label="视图工具">
          <button type="button" title="搜索日程" aria-label="搜索日程" id="search-button">
            <span aria-hidden="true">⌕</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="hot-panel" aria-labelledby="hot-title">
          <div class="panel-heading">
            <p>今日热点</p>
            <button id="hot-refresh" type="button">刷新</button>
          </div>
          <div id="hot-list" class="hot-list" aria-live="polite"></div>
        </aside>

        <section class="calendar-panel" aria-labelledby="calendar-title">
          <div class="view-tabs" role="tablist" aria-label="日历视图">
            <button type="button" role="tab" data-view="multiMonthYear">年</button>
            <button type="button" role="tab" data-view="dayGridMonth" aria-selected="true">月</button>
            <button type="button" role="tab" data-view="timeGridWeek">周</button>
            <button type="button" role="tab" data-view="timeGridDay">日</button>
            <button type="button" role="tab" data-view="listMonth">日程</button>
          </div>

          <div id="year-legend" class="year-legend" hidden>
            <span id="year-legend-left">一 丙午马年</span>
            <span id="year-legend-right">一 农历初一</span>
          </div>

          <div id="calendar" class="calendar-widget" aria-label="日历"></div>

          <div class="lunar-strip">
            <span id="lunar-summary">四月十三 丙午年 [马]</span>
            <button type="button" aria-label="展开农历信息">›</button>
          </div>
        </section>

        <aside class="agenda-panel" aria-labelledby="agenda-title">
          <div class="panel-heading">
            <p id="agenda-title">所选日程</p>
            <span id="agenda-count">0</span>
          </div>
          <div id="agenda-list" class="agenda-list" aria-live="polite"></div>
          <button class="add-button" id="quick-add" type="button">+</button>
        </aside>
      </main>
    </div>

    <section class="voice-float" id="voice-panel" aria-label="语音输入">
      <button id="voice-button" class="voice-button" type="button" aria-label="开始语音输入">
        <span aria-hidden="true"></span>
      </button>
      <div class="voice-copy">
        <strong id="voice-state">点击说话</strong>
        <p id="assistant-reply">语音或文本指令会显示在这里。</p>
        <button id="voice-cancel" class="voice-cancel" type="button" hidden>取消</button>
      </div>
    </section>

    <script src="/static/app.js" defer></script>
  </body>
</html>
